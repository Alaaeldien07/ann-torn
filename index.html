<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ann — Torn Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#e8f0f8;--border:#c5d8ee;--navy:#0d2137;--blue:#1565c0;--accent:#0288d1;--gold:#f59e0b;--green:#16a34a;--red:#dc2626;--text:#0d2137;--muted:#5d7a99;--mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:15px}
.topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.tl{display:flex;align-items:center;gap:14px}
.ab{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
.at{font-size:18px;font-weight:700;color:#fff;letter-spacing:2px}
.as{font-size:10px;color:#7ab3d4;letter-spacing:1px;font-family:var(--mono)}
.sp{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:11px;color:#7ab3d4;font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;background:#16a34a;box-shadow:0 0 6px #16a34a;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.blue::before{background:var(--blue)}.card.gold::before{background:var(--gold)}.card.green::before{background:var(--green)}.card.red::before{background:var(--red)}.card.accent::before{background:var(--accent)}.card.navy::before{background:var(--navy)}
.ct{font-size:10px;letter-spacing:2px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;text-transform:uppercase}
.ar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ar input{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:13px;color:var(--navy);outline:none;transition:border-color .2s}
.ar input:focus{border-color:var(--accent)}
.ar input::placeholder{color:var(--muted)}
.btn{padding:10px 22px;background:var(--blue);border:none;border-radius:6px;color:#fff;font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--accent);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.sec{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn.sec:hover{border-color:var(--accent);color:var(--accent);background:transparent}
.hint{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono);line-height:1.7}
.pn{font-size:26px;font-weight:700;color:var(--navy);line-height:1}
.pl{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;margin-top:6px;font-family:var(--mono)}
.ps2{font-size:13px;color:var(--muted);margin-top:8px}
.po{font-size:12px;color:var(--accent);margin-top:4px;font-family:var(--mono)}
.bi{margin-bottom:12px}.bi:last-child{margin-bottom:0}
.bm{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bl{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:1px}
.bv{font-size:12px;font-family:var(--mono);color:var(--muted)}
.bt{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bf{height:100%;border-radius:4px;transition:width .8s ease}
.bf.energy{background:var(--gold)}.bf.
